<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Sockets</title>
    
    <!--Vanila ice -->
    <script type="module">
        import { io } from 'https://cdn.socket.io/4.3.2/socket.io.esm.min.js';

        const socket = io() 

        const form = document.getElementById('form')
        const input = document.getElementById('input')
        const messages = document.getElementById('messages')

        // Recibir historial de mensajes al conectarse y mostrarlos en pantalla.
        socket.on('chat history', (history) => {
            history.forEach(msg => {
                const item = `<li><strong>${msg.username}:</strong> ${msg.text}</li>`;
                messages.insertAdjacentHTML('beforeend', item)
            })
        })

        // EVENTOS
        socket.on('chat message', (msg) => {
            const item = `<li><strong>${msg.username}</strong> ${msg.text}</li>`;
            messages.insertAdjacentHTML('beforeend', item)
        })

        // Prevenimos que la pagina se recargue al enviar el formulario.
        form.addEventListener('submit', (e) => {
            e.preventDefault()
            
            if (input.value) {
                socket.emit('chat message', input.value)
                input.value = ''
            }
        })

    </script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            color-scheme: light dark;

        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: grid;
            place-content: center;
            height: 100vh;
            padding: 36px 36px 100px 36px;
            grid-template-rows: 1fr;
        }

        #messages {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: scroll;
            height: 100%;
            scroll-behavior: smooth;
            padding-bottom: 48px;
        }

        #messages > li {
            padding: .5rem 1rem;

        }
        
        #chat {
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow:hidden;
            width: 350px;
            height: 100%;
            position: relative;
        }

        #form {
            bottom: 0;
            display: flex;
            height: 48px;
            left: 0;
            padding: 4px;
            position: absolute;
            right: 0;
        }

        #input {
            border-radius: 9999px;
            border: 1 px solid #eee;
            flex: 1;
            margin: 4px;
            padding: 0 8px;
        }

        #input:focus {
            outline: 0;
        }

        #form > button {
            background: rgba(144, 144, 146, 0.991);
            color: #fff;
            margin: 4px;
            border-radius: 4px;
        }

        #form > button:hover {
            background: #0cf;
        }
    </style>
</head>
<body>
    <section id="chat">
        <ul id="messages"></ul>
        <form id="form">
            <input type="text" name="message" id="input" placeholder="Type a message" autocomplete="off"/>
            <button type="submit">Enviar</button>
        </form>
    </section>

</body>
</html>
